name: CI

on:
  push:
    branches: [main, master, dev]
  pull_request:
    branches: [main, master, dev]
    types: [opened, synchronize, reopened]

# Cancel in-progress runs for the same branch on new push
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

# ─────────────────────────────────────────────────────────────────────────────
# JOB 1 — Frontend
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  frontend:
    name: "Frontend — Lint · Types · Build"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./Frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: Frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline

      # ── Lint ──────────────────────────────────────────────────────────────
      - name: Lint (ESLint)
        run: npm run lint
        # Surface lint results as annotations on PR files
        env:
          ESLINT_USE_FLAT_CONFIG: true

      # ── TypeScript ────────────────────────────────────────────────────────
      - name: Type check (tsc --noEmit)
        run: npx tsc --noEmit

      # ── Build ─────────────────────────────────────────────────────────────
      - name: Production build
        run: npm run build

      # ── Upload dist artifact ───────────────────────────────────────────────
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist-${{ github.sha }}
          path: Frontend/dist/
          retention-days: 7

      # ── Bundle size report on PRs ──────────────────────────────────────────
      - name: Report bundle sizes
        if: github.event_name == 'pull_request'
        run: |
          echo "## 📦 Frontend Bundle Sizes" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| File | Size | Gzip |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|------|" >> $GITHUB_STEP_SUMMARY
          find dist/assets -type f | sort | while read f; do
            SIZE=$(du -sh "$f" | cut -f1)
            GZIP=$(gzip -c "$f" | wc -c | awk '{printf "%.1f KB", $1/1024}')
            echo "| \`$(basename $f)\` | $SIZE | $GZIP |" >> $GITHUB_STEP_SUMMARY
          done

# ─────────────────────────────────────────────────────────────────────────────
# JOB 2 — Backend
# ─────────────────────────────────────────────────────────────────────────────
  backend:
    name: "Backend — Lint · Types · Build"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./Backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: Backend/package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline

      # ── TypeScript ────────────────────────────────────────────────────────
      - name: Type check (tsc --noEmit)
        run: npx tsc --noEmit

      # ── Build ─────────────────────────────────────────────────────────────
      - name: Production build
        run: npm run build

      # ── Upload dist artifact ───────────────────────────────────────────────
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-dist-${{ github.sha }}
          path: Backend/dist/
          retention-days: 7

# ─────────────────────────────────────────────────────────────────────────────
# JOB 3 — Quality Gate (runs after both pass)
# ─────────────────────────────────────────────────────────────────────────────
  quality-gate:
    name: "Quality Gate"
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    if: always()

    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.frontend.result }}" != "success" || "${{ needs.backend.result }}" != "success" ]]; then
            echo "❌ One or more jobs failed."
            echo "  Frontend: ${{ needs.frontend.result }}"
            echo "  Backend:  ${{ needs.backend.result }}"
            exit 1
          fi
          echo "✅ All checks passed."

      - name: Write CI summary
        if: always()
        run: |
          echo "## ✅ CI Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend — Lint · Types · Build | ${{ needs.frontend.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Backend  — Types · Build        | ${{ needs.backend.result  == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`  " >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`${{ github.ref_name }}\`  " >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
